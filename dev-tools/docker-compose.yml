version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wpshadow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - wpshadow-network

  wordpress:
    image: wordpress:latest
    container_name: wpshadow-wordpress
    restart: always
    depends_on:
      - mysql
    ports:
      - "9000:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      # Use environment variables for full URL configuration
      # These are set by Codespaces automatically
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://' . (getenv('CODESPACE_NAME') ? getenv('CODESPACE_NAME') . '-9000.' . getenv('GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN') : 'localhost:9000'));
        define('WP_SITEURL', 'http://' . (getenv('CODESPACE_NAME') ? getenv('CODESPACE_NAME') . '-9000.' . getenv('GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN') : 'localhost:9000'));
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    volumes:
      - /workspaces/wpshadow:/var/www/html/wp-content/plugins/wpshadow:rw
      - wordpress_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - wpshadow-network

volumes:
  mysql_data:
  wordpress_data:

networks:
  wpshadow-network:
    driver: bridge
