version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: wpshadow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wpshadow-network

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wpshadow-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      # Pass Codespace environment to container
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-app.github.dev}
      # WordPress configuration with auto-detected URL
      WORDPRESS_CONFIG_EXTRA: |
        // Auto-detect environment (Codespaces or localhost)
        if ( ! empty( getenv( 'CODESPACE_NAME' ) ) ) {
            define( 'WP_HOME', 'https://' . getenv( 'CODESPACE_NAME' ) . '-8080.' . getenv( 'GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN' ) );
            define( 'WP_SITEURL', 'https://' . getenv( 'CODESPACE_NAME' ) . '-8080.' . getenv( 'GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN' ) );
        } else {
            define( 'WP_HOME', 'http://localhost:8080' );
            define( 'WP_SITEURL', 'http://localhost:8080' );
        }
        @ini_set( 'display_errors', 0 );
        // Extended timeouts for development
        @ini_set( 'max_execution_time', '999' );
        @ini_set( 'max_input_time', '999' );
        @ini_set( 'default_socket_timeout', '999' );
    volumes:
      - wordpress_data:/var/www/html
      # Mount the plugin directly into WordPress
      - ./:/var/www/html/wp-content/plugins/wpshadow
      # Custom PHP configuration with extended timeouts
      - ./.devcontainer/php-custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - wpshadow-network

  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin:latest
    container_name: wpshadow-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: wordpress
    networks:
      - wpshadow-network

volumes:
  db_data:
  wordpress_data:

networks:
  wpshadow-network:
    driver: bridge
