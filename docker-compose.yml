version: '3.8'

services:
  # Main WPShadow.com Site
  wordpress-site:
    image: wordpress:latest
    container_name: wpshadow-site
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db-site:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wpshadow_site
      WORDPRESS_DEBUG: 'true'
      WORDPRESS_DEBUG_DISPLAY: 'false'
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
    volumes:
      - wp_site_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wpshadow
      - ../theme-wpshadow:/var/www/html/wp-content/themes/theme-wpshadow
      - ../wpshadow-site-plugin:/var/www/html/wp-content/plugins/wpshadow-site
      - ./wp-config-extra.php:/var/www/html/wp-config-extra.php
    depends_on:
      db-site:
        condition: service_healthy
    networks:
      - wpshadow-network

  db-site:
    image: mysql:8.0
    container_name: wpshadow-site-db
    environment:
      MYSQL_DATABASE: wpshadow_site
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - wp_site_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wpshadow-network

  # Plugin Testing Environment
  wordpress-test:
    image: wordpress:latest
    container_name: wpshadow-test
    ports:
      - "9000:80"
    environment:
      WORDPRESS_DB_HOST: db-test:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wpshadow_test
      WORDPRESS_DEBUG: 'true'
      WORDPRESS_DEBUG_DISPLAY: 'false'
    volumes:
      - wp_test_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/wpshadow
      - ../wpshadow-site-plugin:/var/www/html/wp-content/plugins/wpshadow-site
      - ./wp-config-extra.php:/var/www/html/wp-config-extra.php
    depends_on:
      db-test:
        condition: service_healthy
    networks:
      - wpshadow-network

  db-test:
    image: mysql:8.0
    container_name: wpshadow-test-db
    environment:
      MYSQL_DATABASE: wpshadow_test
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - wp_test_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wpshadow-network

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wpshadow-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_ARBITRARY: 1
      PMA_HOSTS: db-site,db-test
      UPLOAD_LIMIT: 100M
    depends_on:
      - db-site
      - db-test
    networks:
      - wpshadow-network

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: wpshadow-mailhog
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - wpshadow-network

volumes:
  wp_site_data:
  wp_site_db:
  wp_test_data:
  wp_test_db:

networks:
  wpshadow-network:
    driver: bridge
