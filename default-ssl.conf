<VirtualHost *:443>
    ServerName preview.app.github.dev
    ServerAlias *.preview.app.github.dev

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/preview.app.github.dev.crt
    SSLCertificateKeyFile /etc/ssl/private/preview.app.github.dev.key

    # Allow symlinks and .htaccess overrides
    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        
        # WordPress rewrite rules (must be inside Directory block)
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.php$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.php [L]
        </IfModule>
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

