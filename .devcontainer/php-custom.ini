; Custom PHP configuration for WPShadow development
; Extended timeouts for debugging and development

max_execution_time = 999
max_input_time = 999
default_socket_timeout = 999

; Also increase memory and upload limits for development
memory_limit = 512M
upload_max_filesize = 256M
post_max_size = 256M

; Session timeout
session.gc_maxlifetime = 999

; Debugging
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
