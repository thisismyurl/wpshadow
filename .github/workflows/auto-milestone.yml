name: Auto-Assign to Milestone

on:
  issues:
    types: [assigned]

jobs:
  assign-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get current date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Determine next milestone
        id: milestone
        run: |
          today="${{ steps.date.outputs.today }}"
          year="${today:0:4}"
          month="${today:5:2}"
          day="${today:8:2}"
          
          # RC dates for each month (approximate mid-month Monday)
          # If we're past the RC date, assign to next month
          declare -A rc_dates=(
            ["01"]="13"
            ["02"]="10"
            ["03"]="16"
            ["04"]="14"
            ["05"]="12"
            ["06"]="16"
            ["07"]="14"
            ["08"]="11"
            ["09"]="15"
            ["10"]="13"
            ["11"]="10"
            ["12"]="15"
          )
          
          rc_day=${rc_dates[$month]}
          
          if (( day > rc_day )); then
            # Past RC, assign to next month
            next_month=$((month + 1))
            next_year=$year
            
            if (( next_month > 12 )); then
              next_month=1
              next_year=$((year + 1))
            fi
            
            # Format month with leading zero
            next_month=$(printf "%02d" $next_month)
          else
            # Haven't hit RC yet, assign to this month
            next_month=$month
            next_year=$year
          fi
          
          # Format the milestone name: Release 1.YYmm.dd (last day of month)
          case $next_month in
            01) last_day=31 ;;
            02) if (( next_year % 4 == 0 )); then last_day=29; else last_day=28; fi ;;
            03) last_day=31 ;;
            04) last_day=30 ;;
            05) last_day=31 ;;
            06) last_day=30 ;;
            07) last_day=31 ;;
            08) last_day=31 ;;
            09) last_day=30 ;;
            10) last_day=31 ;;
            11) last_day=30 ;;
            12) last_day=31 ;;
          esac
          
          yy=${next_year:2:2}
          milestone_title="Release 1.${yy}${next_month}.${last_day}"
          
          echo "milestone=${milestone_title}" >> $GITHUB_OUTPUT

      - name: Assign to milestone
        uses: actions/github-script@v7
        with:
          script: |
            const milestoneName = '${{ steps.milestone.outputs.milestone }}';
            
            // Find milestone by title
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const milestone = milestones.data.find(m => m.title === milestoneName);
            
            if (milestone) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                milestone: milestone.number
              });
              
              console.log(`✅ Issue #${context.issue.number} assigned to ${milestoneName}`);
            } else {
              console.log(`⚠️  Milestone "${milestoneName}" not found. Issue #${context.issue.number} not assigned.`);
            }
