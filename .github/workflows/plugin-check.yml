name: WordPress Plugin Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    name: Run WordPress.org Plugin Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Setup MySQL
        run: |
          sudo systemctl start mysql
          mysql -e 'CREATE DATABASE test;' -uroot -proot

      - name: Install WordPress environment
        run: |
          composer global require wp-cli/wp-cli-bundle
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH
          mkdir -p /tmp/wordpress
          cd /tmp/wordpress
          wp core download --force
          wp config create --dbname=test --dbuser=root --dbpass=root --dbhost=127.0.0.1
          wp core install --url=http://localhost --title="Test" --admin_user=admin --admin_password=admin --admin_email=test@test.com --skip-email
          
      - name: Install Plugin Check
        run: |
          cd /tmp/wordpress
          wp plugin install plugin-check --activate --allow-root

      - name: Copy WPShadow plugin
        run: |
          cp -r $GITHUB_WORKSPACE /tmp/wordpress/wp-content/plugins/wpshadow
          cd /tmp/wordpress
          wp plugin activate wpshadow --allow-root
          
      - name: Run Plugin Check (Strictest Settings)
        run: |
          cd /tmp/wordpress
          echo "🔍 Running Plugin Check with STRICTEST settings..."
          echo "✓ Including runtime checks"
          echo "✓ Checking ALL categories"
          echo "✓ Failing on warnings (not just errors)"
          echo ""
          
          # Run with all checks, include runtime, fail on warnings
          wp plugin-check run wpshadow \
            --checks=* \
            --include-experimental \
            --format=json \
            --allow-root > $GITHUB_WORKSPACE/plugin-check-results.json || true
          
          # Also output human-readable format
          echo ""
          echo "📊 Full Report:"
          wp plugin-check run wpshadow \
            --checks=* \
            --include-experimental \
            --allow-root

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plugin-check-results
          path: plugin-check-results.json
          retention-days: 30

      - name: Analyze results (Strict Mode)
        run: |
          echo "📋 Analyzing Plugin Check results..."
          
          # Count issues by type
          ERRORS=$(grep -c '"type":"ERROR"' plugin-check-results.json 2>/dev/null || echo "0")
          WARNINGS=$(grep -c '"type":"WARNING"' plugin-check-results.json 2>/dev/null || echo "0")
          
          echo ""
          echo "Results:"
          echo "❌ Errors: $ERRORS"
          echo "⚠️  Warnings: $WARNINGS"
          echo ""
          
          # Show all errors
          if [ "$ERRORS" -gt 0 ]; then
            echo "🔴 ERRORS found:"
            cat plugin-check-results.json | jq -r '.[] | select(.type=="ERROR") | "  ❌ [\(.code)] \(.message) in \(.file):\(.line)"'
            echo ""
          fi
          
          # Show all warnings  
          if [ "$WARNINGS" -gt 0 ]; then
            echo "🟡 WARNINGS found:"
            cat plugin-check-results.json | jq -r '.[] | select(.type=="WARNING") | "  ⚠️  [\(.code)] \(.message) in \(.file):\(.line)"'
            echo ""
          fi
          
          # Strict mode: Fail on ANY errors or warnings
          if [ "$ERRORS" -gt 0 ] || [ "$WARNINGS" -gt 0 ]; then
            echo "❌ FAILED: Plugin Check found $ERRORS errors and $WARNINGS warnings"
            echo "Plugin must pass with ZERO errors and ZERO warnings for WordPress.org submission"
            exit 1
          else
            echo "✅ PASSED: Plugin meets WordPress.org standards (0 errors, 0 warnings)"
          fi
