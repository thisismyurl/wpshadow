name: Auto-Search Documentation for Questions

on:
  issues:
    types: [opened, edited]

jobs:
  search_docs:
    # Only run on Clarification Question issues (has '[QUESTION]' in title or 'question'/'documentation' label)
    if: contains(github.event.issue.title, '[QUESTION]') || contains(github.event.issue.labels.*.name, 'question') || contains(github.event.issue.labels.*.name, 'documentation')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract question text
        id: extract
        run: |
          # Parse the issue body to get "The Question" section
          BODY="${{ github.event.issue.body }}"
          # Extract text between "## The Question" and the next section
          QUESTION=$(echo "$BODY" | sed -n '/## The Question/,/## /p' | sed '1d;$d' | head -1)
          echo "question=$QUESTION" >> $GITHUB_OUTPUT
          
          # Also get question category
          CATEGORY=$(echo "$BODY" | grep -o '\[x\][^-]*' | head -1 || echo "Unknown")
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT

      - name: Search documentation
        id: search
        run: |
          QUESTION="${{ steps.extract.outputs.question }}"
          
          # Extract key terms from question
          SEARCH_TERMS=$(echo "$QUESTION" | tr '[:upper:]' '[:lower:]' | sed -e 's/[?.,!]//g')
          
          # Initialize results
          FOUND_CONTENT=""
          RELEVANT_DOCS=""
          
          # Priority search order based on common question types
          PRIORITY_DOCS=(
            "docs/PRODUCT_PHILOSOPHY.md"
            "docs/COMMUNITY_MANAGER_ONBOARDING.md"
            "docs/ROADMAP.md"
            "docs/FEATURE_MATRIX_DIAGNOSTICS.md"
            "docs/FEATURE_MATRIX_TREATMENTS.md"
            "docs/TECHNICAL_STATUS.md"
          )
          
          # Check priority docs first
          for doc in "${PRIORITY_DOCS[@]}"; do
            if [ -f "$doc" ] && grep -qi "$SEARCH_TERMS" "$doc" 2>/dev/null; then
              RELEVANT_DOCS="$RELEVANT_DOCS\n- [$(basename $doc)](https://github.com/thisismyurl/wpshadow/blob/main/$doc)"
              
              # Extract relevant sections (look for headers and surrounding context)
              SECTION=$(grep -i -B 3 -A 10 "$SEARCH_TERMS" "$doc" 2>/dev/null | head -40)
              if [ ! -z "$SECTION" ]; then
                FOUND_CONTENT="$FOUND_CONTENT\n\n### From $(basename $doc)\n\n$SECTION\n"
              fi
            fi
          done
          
          # If nothing found in priority docs, search all docs
          if [ -z "$RELEVANT_DOCS" ]; then
            for doc in docs/*.md; do
              if [ -f "$doc" ] && grep -qi "$SEARCH_TERMS" "$doc" 2>/dev/null; then
                RELEVANT_DOCS="$RELEVANT_DOCS\n- [$(basename $doc)](https://github.com/thisismyurl/wpshadow/blob/main/$doc)"
                
                SECTION=$(grep -i -B 2 -A 8 "$SEARCH_TERMS" "$doc" 2>/dev/null | head -30)
                if [ ! -z "$SECTION" ]; then
                  FOUND_CONTENT="$FOUND_CONTENT\n\n### From $(basename $doc)\n\n$SECTION\n"
                fi
              fi
            done
          fi
          
          # Output results
          if [ -z "$RELEVANT_DOCS" ]; then
            echo "status=no_match" >> $GITHUB_OUTPUT
            echo "docs=" >> $GITHUB_OUTPUT
            echo "content=" >> $GITHUB_OUTPUT
          else
            echo "status=found" >> $GITHUB_OUTPUT
            echo "docs<<EOF" >> $GITHUB_OUTPUT
            echo -e "$RELEVANT_DOCS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo -e "$FOUND_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Post documentation search comment
        if: always()
        uses: actions/github-script@v7
        env:
          SEARCH_STATUS: ${{ steps.search.outputs.status }}
          SEARCH_DOCS: ${{ steps.search.outputs.docs }}
          SEARCH_CONTENT: ${{ steps.search.outputs.content }}
          QUESTION_TEXT: ${{ steps.extract.outputs.question }}
        with:
          script: |
            const status = process.env.SEARCH_STATUS;
            const docs = process.env.SEARCH_DOCS;
            const content = process.env.SEARCH_CONTENT;
            const question = process.env.QUESTION_TEXT;
            
            let comment = '';
            
            if (status === 'found') {
              comment = `🤖 **Automated Documentation Search**\n\n**Your question:** ${question}\n\n---\n\n## 📚 Found in Documentation\n\n${content}\n\n---\n\n**Full documents:**\n${docs}\n\n**Next steps:**\n- Review the content above\n- Click document links for full context\n- If this doesn't fully answer your question, @thisismyurl or the AI agent will provide additional details\n- Your question helps improve our documentation!`;
            } else {
              comment = `🤖 **Automated Documentation Search**\n\n**Your question:** ${question}\n\n---\n\nI searched the documentation but didn't find a direct match. This could mean:\n- This topic needs better documentation (we'll add it!)\n- The question needs rephrasing with different keywords\n- It requires developer insight\n\n@thisismyurl will review and provide a detailed answer soon. Thank you for helping identify documentation gaps!`;
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
