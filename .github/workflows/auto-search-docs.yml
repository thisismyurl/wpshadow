name: Auto-Search Documentation for Questions

on:
  issues:
    types: [opened, edited]

jobs:
  search_docs:
    # Only run on Clarification Question issues (labeled with 'question')
    if: contains(github.event.issue.labels.*.name, 'question')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract question text
        id: extract
        run: |
          # Parse the issue body to get "The Question" section
          BODY="${{ github.event.issue.body }}"
          # Extract text between "## The Question" and the next section
          QUESTION=$(echo "$BODY" | sed -n '/## The Question/,/## /p' | sed '1d;$d' | head -1)
          echo "question=$QUESTION" >> $GITHUB_OUTPUT
          
          # Also get question category
          CATEGORY=$(echo "$BODY" | grep -o '\[x\][^-]*' | head -1 || echo "Unknown")
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT

      - name: Search documentation
        id: search
        run: |
          QUESTION="${{ steps.extract.outputs.question }}"
          
          # Convert question to search terms (remove common words, take key terms)
          SEARCH_TERMS=$(echo "$QUESTION" | sed -e 's/[?.,!]//g' | tr '[:upper:]' '[:lower:]')
          
          # Search docs folder for matching content
          RESULTS=""
          FOUND_FILES=""
          
          # Search in docs folder
          for doc in docs/*.md; do
            if [ -f "$doc" ]; then
              # Check if any search term matches (case-insensitive)
              if grep -qi -E "$SEARCH_TERMS" "$doc" 2>/dev/null; then
                FOUND_FILES="$FOUND_FILES$(basename $doc)\n"
                # Extract relevant excerpt
                EXCERPT=$(grep -i -A 2 -B 2 -E "$SEARCH_TERMS" "$doc" | head -10)
                RESULTS="$RESULTS\n**$(basename $doc)**:\n\`\`\`\n$EXCERPT\n\`\`\`\n"
              fi
            fi
          done
          
          # Output for comment
          if [ -z "$FOUND_FILES" ]; then
            echo "status=no_match" >> $GITHUB_OUTPUT
            echo "results=No directly matching documentation found." >> $GITHUB_OUTPUT
          else
            echo "status=found" >> $GITHUB_OUTPUT
            echo "results=$RESULTS" >> $GITHUB_OUTPUT
            echo "files=$FOUND_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Post documentation search comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.search.outputs.status }}';
            const results = `${{ steps.search.outputs.results }}`;
            const question = `${{ steps.extract.outputs.question }}`;
            
            let comment = '';
            
            if (status === 'found') {
              comment = `🔍 **Documentation Search Results**\n\nBased on your question: "${question}"\n\nI found relevant documentation:\n\n${results}\n\n---\n\n**Next steps:**\n- Review the docs above to see if they answer your question\n- If not found or unclear, Christopher or the AI agent will provide a detailed response\n- Questions help us improve documentation!`;
            } else {
              comment = `🔍 **Documentation Search Results**\n\nBased on your question: "${question}"\n\n${results}\n\nIt looks like this topic might not be covered in the docs yet. Christopher or the AI agent will investigate and respond soon.`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
