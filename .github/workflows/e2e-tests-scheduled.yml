name: E2E Tests (Scheduled)

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  e2e-tests:
    name: Scheduled E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Create .env file
        run: |
          cat > tests/e2e/.env << EOF
          WP_BASE_URL=${{ secrets.WP_BASE_URL || 'https://wpshadow.com' }}
          WP_ADMIN_USER=${{ secrets.WP_ADMIN_USER || 'github' }}
          WP_ADMIN_PASS=${{ secrets.WP_ADMIN_PASS || 'github' }}
          EOF
      
      - name: Run E2E tests
        run: npm run test:e2e
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-scheduled
          path: tests/e2e-reports/
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Scheduled E2E Tests Failed',
              body: `## Scheduled E2E Test Failure\n\n**Date:** ${new Date().toISOString()}\n\n**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate the failed tests.`,
              labels: ['bug', 'automated-test-failure', 'e2e']
            });
