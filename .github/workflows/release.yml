name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package
        required: false
        default: main

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Determine plugin version
        id: version
        run: |
          version="$(php -r '$source = file_get_contents("wpshadow.php"); preg_match("/^ \* Version: (.+)$/m", $source, $matches); echo trim($matches[1] ?? "snapshot");')"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build distributable zip
        run: |
          rm -rf dist
          mkdir -p dist/build/wpshadow
          rsync -a --delete \
            --exclude '.git/' \
            --exclude-from='.distignore' \
            ./ dist/build/wpshadow/
          cd dist/build
          zip -rq "../wpshadow-${{ steps.version.outputs.value }}.zip" wpshadow

      - name: Generate SHA-256 checksum
        run: |
          cd dist
          sha256sum "wpshadow-${{ steps.version.outputs.value }}.zip" > "wpshadow-${{ steps.version.outputs.value }}.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wpshadow-${{ steps.version.outputs.value }}
          path: |
            dist/wpshadow-${{ steps.version.outputs.value }}.zip
            dist/wpshadow-${{ steps.version.outputs.value }}.zip.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          title="WP Shadow ${{ steps.version.outputs.value }}"
          notes="Automated beta package for ${tag_name}."

          if gh release view "${tag_name}" >/dev/null 2>&1; then
            gh release upload "${tag_name}" \
              "dist/wpshadow-${{ steps.version.outputs.value }}.zip" \
              "dist/wpshadow-${{ steps.version.outputs.value }}.zip.sha256" \
              --clobber
          else
            gh release create "${tag_name}" \
              "dist/wpshadow-${{ steps.version.outputs.value }}.zip" \
              "dist/wpshadow-${{ steps.version.outputs.value }}.zip.sha256" \
              --title "${title}" \
              --notes "${notes}"
          fi