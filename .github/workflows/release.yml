name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create plugin zip (export-ignore respected)
        run: |
          git archive --format=zip --output wpshadow.zip HEAD
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpshadow
          path: wpshadow.zip
