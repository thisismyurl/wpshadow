name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true

jobs:
  build:
    name: Build Release Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build release package
        run: |
          if [ -f "build-release.sh" ]; then
            bash build-release.sh
          elif [ -f ".devcontainer/build-release.sh" ]; then
            bash .devcontainer/build-release.sh
          fi

      - name: Create checksums
        run: |
          cd build
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wpshadow-release-${{ steps.get_version.outputs.VERSION }}
          path: |
            build/*.zip
            build/checksums.txt

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wpshadow-release-${{ steps.get_version.outputs.VERSION }}
          path: build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          if [ -f "CHANGELOG.md" ]; then
            awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '1d;$d' > release_notes.md
          else
            echo "Release version ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [RELEASE_NOTES.md](RELEASE_NOTES.md) for details." >> release_notes.md
          fi
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: WPShadow v${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: |
            build/*.zip
            build/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wordpress-org:
    name: Deploy to WordPress.org
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        if: env.SVN_USERNAME != '' && env.SVN_PASSWORD != ''
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
          SLUG: wpshadow
        continue-on-error: true

      - name: Deployment status
        run: |
          if [ -z "${{ secrets.WP_ORG_USERNAME }}" ]; then
            echo "⚠️ WordPress.org deployment skipped - credentials not configured"
            echo "To enable automatic deployment to WordPress.org:"
            echo "1. Add WP_ORG_USERNAME secret"
            echo "2. Add WP_ORG_PASSWORD secret"
          else
            echo "✅ WordPress.org deployment attempted"
          fi
