name: Auto-Approve Copilot Intelligence PRs

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-merge:
    name: Auto-approve Copilot intelligence updates
    runs-on: ubuntu-latest

    # Only run for Copilot bot PRs with intelligence-related changes
    if: |
      (github.actor == 'copilot[bot]' || github.actor == 'app/copilot') &&
      (contains(github.event.pull_request.title, 'Copilot intelligence') ||
       contains(github.event.pull_request.title, 'Copilot instructions') ||
       contains(github.event.pull_request.title, 'copilot-instructions.md') ||
       contains(github.event.pull_request.title, 'context.md'))

    steps:
      - name: Check PR files
        id: check-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            // Only approve if PR only touches safe files
            const safeFiles = [
              '.github/copilot-instructions.md',
              '.copilot/context.md',
              '.github/wpshadow-ecosystem.yml',
              'README.md'
            ];

            const allFilesSafe = files.every(file =>
              safeFiles.some(safe => file.filename === safe)
            );

            console.log('Files in PR:', files.map(f => f.filename));
            console.log('All files safe:', allFilesSafe);

            return allFilesSafe;

      - name: Mark as ready for review
        if: steps.check-files.outputs.result == 'true' && github.event.pull_request.draft
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              draft: false
            });
            console.log('✅ Marked PR as ready for review');

      - name: Approve PR
        if: steps.check-files.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: '✅ Auto-approved: Copilot intelligence layer update\n\nThis PR adds documentation and context files to improve GitHub Copilot suggestions. No code changes included.'
            });
            console.log('✅ PR approved');

      - name: Enable auto-merge
        if: steps.check-files.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash',
                commit_title: `${context.payload.pull_request.title} (#${context.payload.pull_request.number})`,
                commit_message: 'Auto-merged by Copilot Intelligence workflow'
              });
              console.log('✅ PR merged successfully');
            } catch (error) {
              console.log('⚠️ Could not auto-merge:', error.message);
              console.log('PR approved but requires manual merge');
            }

      - name: Add success comment
        if: steps.check-files.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 Auto-Approved & Merged

            Reason: Copilot intelligence layer update

            This PR was automatically approved and merged because:
            - ✅ Created by GitHub Copilot
            - ✅ Only modifies documentation/context files
            - ✅ No code changes included
            - ✅ Improves Copilot suggestions

            Files updated:
            ${context.payload.pull_request.changed_files} files changed (+${context.payload.pull_request.additions}/-${context.payload.pull_request.deletions})

            Merged by GitHub Actions workflow.`
            });

      - name: Block unsafe PRs
        if: steps.check-files.outputs.result == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠️ Auto-Merge Blocked

            This PR contains files outside the safe list and requires manual review.

            Safe files:
            - .github/copilot-instructions.md
            - .copilot/context.md
            - .github/wpshadow-ecosystem.yml
            - README.md

            Please review manually.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-review']
            });
