name: Generate Podcast Episodes

on:
  push:
    paths:
      - '.github/workflows/podcast.yml'
      - 'mlcampbell/**'
  workflow_dispatch:
    inputs:
      episode_number:
        description: 'Episode number'
        required: true
        default: '001'
      topic:
        description: 'Episode topic'
        required: true

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json
      
      - name: Create .env file with secrets
        working-directory: ./mlcampbell
        run: |
          cat > .env <<EOF
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          DEBUG=false
          EOF
      
      - name: Test API connection
        working-directory: ./mlcampbell
        run: |
          php -r "
          require 'ElevenLabsIntegration.php';
          \$api = new ElevenLabsIntegration(getenv('ELEVENLABS_API_KEY'));
          echo \"Testing connection...\\n\";
          if (\$api->testConnection()) {
              echo \"✓ Connection successful\\n\";
              exit(0);
          } else {
              echo \"✗ Connection failed\\n\";
              exit(1);
          }
          "
      
      - name: Generate podcast script
        working-directory: ./mlcampbell
        run: php PodcastScriptGenerator.php
      
      - name: Generate audio from script
        working-directory: ./mlcampbell
        run: php ElevenLabsIntegration.php
      
      - name: List generated files
        working-directory: ./mlcampbell
        run: |
          echo "Generated audio files:"
          ls -lh audio_segments/ || echo "No audio files generated"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: podcast-episode
          path: mlcampbell/audio_segments/
          retention-days: 30
      
      - name: Create release (optional)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: podcast-episode-${{ github.event.inputs.episode_number }}
          release_name: Podcast Episode ${{ github.event.inputs.episode_number }}
          body: |
            Episode Topic: ${{ github.event.inputs.topic }}
            
            Audio files available in the artifacts.
