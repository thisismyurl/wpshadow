name: Docs Alignment Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: diff
        run: |
          set -e
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags --prune origin "$BASE_REF"
          CHANGED=$(git diff --name-only "origin/$BASE_REF" HEAD)
          echo "$CHANGED" > changed.txt
          echo "Changed files:\n$CHANGED"

      - name: Check for code changes without docs updates
        run: |
          set -e
          CHANGED=$(cat changed.txt)
          echo "Evaluating docs alignment..."
          CODE_CHANGED=$(echo "$CHANGED" | grep -E '^(includes/|wpshadow.php|assets/js|assets/css)' || true)
          DOCS_CHANGED=$(echo "$CHANGED" | grep -E '^docs/' || true)

          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "::error title=Docs alignment::Code changes detected without docs updates in docs/"
            echo "Changed code files:\n$CODE_CHANGED"
            exit 1
          else
            echo "✅ Docs alignment OK"
          fi
