name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  COMPOSER_CACHE_DIR: ~/.composer/cache

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: curl, dom, mbstring, tokenizer, xml, zip

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run phpcs
        run: composer phpcs

      - name: Run phpstan
        run: composer phpstan

  guardian:
    name: Guardian Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: curl, dom, mbstring, tokenizer, xml, zip

      - name: Run guardian check
        run: ./scripts/guardian-check.sh
