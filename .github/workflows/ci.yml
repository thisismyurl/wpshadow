name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.4'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer manifest
        run: composer validate --no-check-publish --strict

      - name: Install development dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint plugin PHP files
        run: |
          php -l wpshadow.php
          php -l uninstall.php
          find includes tests scripts -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit
        run: composer test:phpunit
