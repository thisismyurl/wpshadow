name: Daily Git Sync Check

on:
  schedule:
    - cron: '15 9 * * *'
  workflow_dispatch:

env:
  TZ: UTC

jobs:
  git-sync:
    name: Git Sync Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run sync check
        id: sync
        run: ./scripts/git-sync-check.sh
        continue-on-error: true

      - name: Open issue if drift detected
        if: steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const title = `Automated sync check failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              'The scheduled git sync check detected drift.',
              '',
              `Workflow run: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              '',
              'Please review the run logs for details.'
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open' });
            const existing = issues.data.find(i => i.title.startsWith('Automated sync check failed'));
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }
