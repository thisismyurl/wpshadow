name: Sync Check Warning

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  check-commit-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for large commits
        run: |
          # Get number of files changed in the last commit
          FILES_CHANGED=$(git diff --name-only HEAD^ HEAD | wc -l)

          echo "Files changed in last commit: $FILES_CHANGED"

          if [ "$FILES_CHANGED" -gt 100 ]; then
            echo "⚠️ WARNING: Large commit detected ($FILES_CHANGED files)"
            echo "This might indicate uncommitted changes being bulk-committed."
            echo ""
            echo "Best practices:"
            echo "- Commit frequently (after each feature/fix)"
            echo "- Use feature branches for large changes"
            echo "- Run 'scripts/git-sync-check.sh' before starting work"
            echo ""
            echo "This is a warning, not an error. Workflow will continue."
          else
            echo "✅ Normal commit size"
          fi

  check-branch-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if branch is behind main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)

          if [ "$BEHIND" -gt 0 ]; then
            echo "⚠️ WARNING: Your branch is $BEHIND commits behind main"
            echo "Consider rebasing: git pull origin main --rebase"
          else
            echo "✅ Branch is up to date with main"
          fi
